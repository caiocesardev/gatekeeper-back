# yaml-language-server: $schema=https://json.schemastore.org/spring-boot-application.json

spring:
  application:
    name: gatekeeper-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gatekeeper_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:adminpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mqtt:
    broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: ${MQTT_CLIENT_ID:spring-boot-backend}

app:
  jwt:
    secret: ${JWT_SECRET:GatekeeperBackJwtSecretKey_ChangeInProduction_32CharsMin}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
